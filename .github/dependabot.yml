version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 20
    groups:
      vite-ecosystem:
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'
      eslint-ecosystem:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@vue/eslint-*'
          - 'oxlint'
      types:
        patterns:
          - '@types/*'
    ignore:
      - dependency-name: 'vue'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
