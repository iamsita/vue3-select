<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue3-select · CDN demo</title>
    <link rel="stylesheet" href="../dist/vue3-select.css" />
    <style>
      body { font: 14px system-ui; max-width: 480px; margin: 60px auto; padding: 0 20px; }
      h1 { font-size: 18px; }
      pre { background: #f1f5f9; padding: 8px 12px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>vue3-select · CDN demo</h1>
    <p>Two script tags: Vue, then this package. No bundler required.</p>

    <div id="app">
      <v-select
        v-model="picked"
        :options="fruits"
        placeholder="Pick a fruit"
      ></v-select>
      <pre>picked: {{ picked }}</pre>
    </div>

    <!-- 1. Vue (must come first — exposes window.Vue) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- 2. vue3-select IIFE (exposes window.VueSelect) -->
    <script src="../dist/vue3-select.global.js"></script>

    <script>
      const { createApp, ref } = Vue
      const { VSelect } = VueSelect

      createApp({
        components: { VSelect },
        setup() {
          return {
            picked: ref(null),
            fruits: ['Apple', 'Banana', 'Cherry', 'Durian'],
          }
        },
      }).mount('#app')
    </script>
  </body>
</html>
